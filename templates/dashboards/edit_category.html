{% extends 'base.html' %} {% load crispy_forms_tags %} {% block content %}
<style>
  :root {
    --dash-primary: #6366f1;
    --dash-secondary: #a855f7;
    --dash-bg: #f8fafc;
    --dash-card: rgba(255, 255, 255, 0.8);
    --dash-text: #1e293b;
    --dash-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  }

  .dashboard-container {
    padding: 2rem 0;
    background-color: var(--dash-bg);
    min-height: 80vh;
  }

  .custom-card {
    background: var(--dash-card);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    padding: 2.5rem;
  }

  .btn-submit {
    background: var(--dash-gradient);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 14px;
    font-weight: 700;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    color: white;
  }

  .form-control {
    border-radius: 12px;
    padding: 12px 15px;
    border: 1px solid #e2e8f0;
    background-color: #f8fafc;
  }

  .form-control:focus {
    border-color: var(--dash-primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }
</style>

<div class="dashboard-container">
  <div class="container">
    <div class="row">
      <!-- Left side content -->
      <div class="col-md-3 mb-4">{% include 'dashboards/sidebar.html' %}</div>
      <!-- Right side content -->
      <div class="col-md-9">
        <div class="d-flex align-items-center mb-4">
          <a href="{% url 'category' %}" class="text-muted mr-3" title="Back">
            <i class="fa-solid fa-circle-arrow-left fa-2x"></i>
          </a>
          <h2 class="font-weight-bold mb-0">
            Edit Category:
            <span class="text-primary">{{ category.category_name }}</span>
          </h2>
        </div>

        <div class="custom-card">
          <form
            action="{% url 'edit_category' category.id %}"
            method="POST"
            style="max-width: 600px"
          >
            {% csrf_token %} {{ form | crispy }}
            <div class="mt-4">
              <button type="submit" class="btn btn-submit">
                <i class="fa-solid fa-floppy-disk mr-2"></i> Update Category
              </button>
              <a
                href="{% url 'category' %}"
                class="btn btn-light ml-2 p-2 px-4 rounded-lg font-weight-bold text-muted"
                >Cancel</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
