<!-- ================= SIDEBAR COMPONENT ================= -->

<style>
  :root {
    --side-primary: #4f46e5;
    --side-bg: #ffffff;
    --side-border: #e2e8f0;
    --side-text: #475569;
    --side-active-bg: #eef2ff;
    --side-active-text: #4f46e5;
  }

  .sidebar-professional {
    background: var(--side-bg);
    border: 1px solid var(--side-border);
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
    height: fit-content;
    position: sticky;
    top: 2rem;
  }

  .sidebar-header-pro {
    text-align: center;
    padding-bottom: 1.5rem;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--side-border);
  }

  .sidebar-avatar {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    color: white;
    font-size: 1.5rem;
    font-weight: 800;
  }

  .sidebar-username {
    font-weight: 800;
    color: #0f172a;
    font-size: 1.1rem;
    margin-bottom: 0.2rem;
  }

  .sidebar-subtitle {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    color: #94a3b8;
  }

  .sidebar-nav-pro {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .nav-link-pro {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 12px;
    color: var(--side-text);
    font-weight: 600;
    text-decoration: none;
    transition: 0.2s ease;
  }

  .nav-link-pro i {
    width: 20px;
  }

  .nav-link-pro:hover {
    background: #f8fafc;
    color: var(--side-primary);
    transform: translateX(5px);
  }

  .nav-link-pro.active {
    background: var(--side-active-bg);
    color: var(--side-active-text);
  }

  .sidebar-divider {
    border-top: 1px solid var(--side-border);
    margin: 1.2rem 0;
  }

  /* MOBILE */
  @media (max-width: 991px) {
    .sidebar-professional {
      position: relative;
      top: 0;
      margin-bottom: 1.5rem;
    }
  }
</style>

<div class="sidebar-professional">
  <div class="sidebar-header-pro">
    <div class="sidebar-avatar">{{ user.username|slice:":1"|upper }}</div>
    <h5 class="sidebar-username">{{ user.username }}</h5>
    <p class="sidebar-subtitle mb-0">System Admin</p>
  </div>

  <nav class="sidebar-nav-pro">
    <a
      href="{% url 'dashboard' %}"
      class="nav-link-pro {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
    >
      <i class="fa-solid fa-gauge-high"></i>
      Dashboard
    </a>

    <a
      href="{% url 'category' %}"
      class="nav-link-pro {% if request.resolver_match.url_name == 'category' %}active{% endif %}"
    >
      <i class="fa-solid fa-folder-tree"></i>
      Categories
    </a>

    <a
      href="{% url 'posts' %}"
      class="nav-link-pro {% if request.resolver_match.url_name == 'posts' %}active{% endif %}"
    >
      <i class="fa-solid fa-file-lines"></i>
      Posts
    </a>

    <div class="sidebar-divider"></div>

    <a href="{% url 'logout' %}" class="nav-link-pro text-danger">
      <i class="fa-solid fa-power-off"></i>
      Logout
    </a>
  </nav>
</div>
