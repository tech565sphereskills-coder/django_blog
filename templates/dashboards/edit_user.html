{% extends 'base.html' %} {% load crispy_forms_tags %} {% block content %}

<div class="container-fluid mt-4">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-lg-3">{% include 'dashboards/sidebar.html' %}</div>

    <!-- Main Content -->
    <div class="col-lg-9">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <h2 class="fw-bold mb-4">Edit User: {{ user.username }}</h2>
          <form action="{% url 'edit_user' user.id %}" method="POST">
            {% csrf_token %} {{ form|crispy }}
            <div class="mt-4">
              <button
                type="submit"
                class="btn btn-warning rounded-pill px-4 font-weight-bold"
                style="
                  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
                  border: none;
                  color: white;
                "
              >
                Update User
              </button>
              <a
                href="{% url 'users' %}"
                class="btn btn-secondary rounded-pill px-4 ml-2"
                >Cancel</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
